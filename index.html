<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name & Age Fetcher</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 320px; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    button { padding: 8px 16px; cursor: pointer; }
    .error { color: #d00; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h2>People Data</h2>
  <button id="fetchBtn">Fetch Data</button>
  <div id="status"></div>
  <table id="dataTable">
    <thead>
      <tr><th>Name</th><th>Age</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // ⚠️ Replace with the actual webhook URL from your n8n workflow
    const WEBHOOK_URL = 'https://mkn8n.app.n8n.cloud/webhook/33006e45-be6e-40b6-9dd7-f17187d46970';

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      const tbody = document.querySelector('#dataTable tbody');

      status.textContent = 'Loading…';
      status.className = '';
      tbody.innerHTML = '';

      try {
        const response = await fetch(WEBHOOK_URL);
        if (!response.ok) throw new Error(`Server error (${response.status})`);

        const data = await response.json();

        // Expected format: array of objects with "Name" and "Age"
        // Example: [{"Name":"Alice","Age":30}, {"Name":"Bob","Age":25}]
        if (!Array.isArray(data)) throw new Error('Response is not an array');

        data.forEach(item => {
          const row = tbody.insertRow();
          row.insertCell().textContent = item.Name ?? '';
          row.insertCell().textContent = item.Age ?? '';
        });

        status.textContent = `✅ Loaded ${data.length} record(s).`;
      } catch (error) {
        status.textContent = `❌ Error: ${error.message}`;
        status.className = 'error';
      }
    });
  </script>
</body>
</html>
