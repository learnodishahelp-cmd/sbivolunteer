<!DOCTYPE html>
<html>
<head>
<title>Registration Dashboard</title>

<style>
body{
    font-family: Arial;
    margin:20px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
}

th{
    background:#eee;
}

#status{
    margin-top:15px;
}
</style>

</head>

<body>

<h2>Registration Dashboard</h2>

<button onclick="fetchData()" id="btn">
Load Data
</button>

<div id="status"></div>

<table id="table">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>PF Number</th>
<th>Branch</th>
<th>Boarding Place</th>
<th>Mobile</th>
<th>Persons</th>
</tr>
</thead>

<tbody>

</tbody>

</table>



<script>


const CONFIG={


fetchURL:
"https://mkn8n.app.n8n.cloud/webhook/33006e45-be6e-40b6-9dd7-f17187d46970"

};



async function fetchData(){


const btn=document.getElementById("btn");

const status=document.getElementById("status");


btn.disabled=true;

status.innerHTML="Loading...";


try{


const response = await fetch(
CONFIG.fetchURL,
{
method:"GET",
headers:{
"Accept":"application/json"
}
});


if(!response.ok){

throw new Error(
"Server error "+response.status
);

}


const result = await response.json();


console.log("n8n response:",result);



let data=[];


// Your n8n format

if(result.data && Array.isArray(result.data)){

data=result.data;

}



console.log(
"Records:",
data.length
);



if(data.length===0){

status.innerHTML=
"No registration data found";

return;

}



displayTable(data);



status.innerHTML=
"Loaded "+data.length+" registrations";


}
catch(error){

console.error(error);

status.innerHTML=
"Error loading data";

}


finally{

btn.disabled=false;

}



}





function displayTable(data){


const tbody=
document.querySelector("#table tbody");


tbody.innerHTML="";


data.forEach(row=>{


const tr=document.createElement("tr");


tr.innerHTML=`

<td>${row["Registration ID"] || ""}</td>

<td>${row["Staff Name"] || ""}</td>

<td>${row["PF Number"] || ""}</td>

<td>${row["Branch"] || ""}</td>

<td>${row["Boarding Place"] || ""}</td>

<td>${row["Mobile Number"] || ""}</td>

<td>${row["Number of Persons"] || ""}</td>

`;

tbody.appendChild(tr);


});


}


</script>


</body>
</html>
